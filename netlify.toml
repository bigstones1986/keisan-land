[build]
  publish = "."
  command = "npm run qa"

[build.processing.html]
  pretty_urls = false

[[redirects]]
  from = "/step-calculation.html"
  to = "/step-calculation"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
